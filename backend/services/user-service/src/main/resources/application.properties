spring.application.name=user-service
server.port=8083

# Eureka (optional for local run)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# DB – override with DB_URL, DB_USERNAME, DB_PASSWORD in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/certifypro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT – set JWT_SECRET in production (min 256 bits)
jwt.secret=${JWT_SECRET:dev-secret-min-32-chars-for-local-only}
jwt.expiration=${JWT_EXPIRATION:86400000}
