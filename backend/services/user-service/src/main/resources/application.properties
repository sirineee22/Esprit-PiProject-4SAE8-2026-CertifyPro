spring.application.name=USER-SERVICE
server.port=8883

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

# DB – uses env vars (DB_URL, DB_USERNAME, DB_PASSWORD) or application-local.properties when profile=local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/userdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:sisina}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT – set JWT_SECRET in production (min 256 bits)
jwt.secret=${JWT_SECRET:dev-secret-min-32-chars-for-local-only}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Profile image uploads (relative to working directory)
app.upload.profile-dir=uploads/profile

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sirine.dahmane@esen.tn
