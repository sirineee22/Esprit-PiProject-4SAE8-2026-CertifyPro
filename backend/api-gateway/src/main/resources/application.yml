server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**,/api/roles/**
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: trainer-requests-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/trainer-requests/**
        - id: evaluations-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/evaluations/**,/api/evaluations
        - id: formations-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/formations/**,/api/formations
        - id: quizzes-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/quizzes/**,/api/quizzes
        - id: progression-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/progression/**,/api/progression
        - id: favorites-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/favorites/**,/api/favorites
        - id: stats-service
          uri: lb://TRAINING-SERVICE
          predicates:
            - Path=/api/stats/**,/api/stats

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka/
