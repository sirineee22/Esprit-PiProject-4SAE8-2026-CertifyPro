server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**,/api/roles/**
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: trainer-requests-service
          uri: lb://PLANNED-SESSION-SERVICE
          predicates:
            - Path=/api/trainer-requests/**
        - id: planned-session-service
          uri: lb://PLANNED-SESSION-SERVICE
          predicates:
            - Path=/api/schedules/**
        - id: room-service
          uri: lb://PLANNED-SESSION-SERVICE
          predicates:
            - Path=/api/rooms/**
        - id: collaboration-service
          uri: lb://COLLABORATION-SERVICE
          predicates:
            - Path=/api/groups/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
