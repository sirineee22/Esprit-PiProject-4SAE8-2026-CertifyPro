server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        # When downstream services also add CORS headers, the browser rejects duplicate values.
        # This keeps only the first occurrence.
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**,/api/roles/**
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: trainer-requests-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/trainer-requests/**
        - id: forum-service
          uri: lb://FORUM-SERVICE
          predicates:
            - Path=/api/forum/**,/uploads/posts/**
        - id: ecommerce-service
          uri: lb://ECOMMERCE-SERVICE
          predicates:
            - Path=/api/products/**,/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
