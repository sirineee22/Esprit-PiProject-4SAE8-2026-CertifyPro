<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Template</title>
  <style>
    :root {
      --paper: #fefcf6;
      --ink: #0f172a;
      --accent: #c9b16f;
      --shape: #a7aecf;
      --muted: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e5e7eb;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
    }

    .certificate {
      width: 1200px;
      height: 850px;
      position: relative;
      background: var(--paper);
      overflow: hidden;
      border: 5px solid #e6d8a9;
    }

    .shape {
      position: absolute;
      background: var(--shape);
      opacity: 0.85;
      border-radius: 50%;
    }

    .shape.top-right {
      width: 260px;
      height: 260px;
      top: -80px;
      right: -45px;
    }

    .shape.bottom-left {
      width: 260px;
      height: 260px;
      bottom: -90px;
      left: -50px;
    }

    .shape.bottom-center {
      width: 220px;
      height: 220px;
      bottom: -120px;
      left: 42%;
    }

    .inner-border {
      position: absolute;
      inset: 22px;
      border: 3px solid #e8dcb5;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 70px 80px 50px;
      text-align: center;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .heading {
      margin-top: 8px;
    }

    .heading h1 {
      margin: 0;
      font-size: 88px;
      line-height: 0.92;
      letter-spacing: 2px;
      font-weight: 900;
    }

    .heading .subtitle {
      margin-top: 8px;
      font-size: 44px;
      letter-spacing: 9px;
      font-weight: 700;
    }

    .presented {
      margin-top: 24px;
      font-size: 42px;
      letter-spacing: 2px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .recipient-name {
      margin-top: 22px;
      font-size: 92px;
      line-height: 1;
      font-family: "Times New Roman", serif;
      font-style: italic;
      font-weight: 700;
      color: #111827;
    }

    .description {
      margin: 34px auto 0;
      max-width: 860px;
      font-size: 38px;
      line-height: 1.45;
      color: #1f2937;
      font-weight: 500;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 180px 1fr;
      align-items: end;
      gap: 26px;
      margin-top: 24px;
      padding: 0 24px 12px;
    }

    .signature-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .signature-line {
      width: 280px;
      border-bottom: 4px solid #111827;
      padding-bottom: 8px;
      font-family: "Brush Script MT", cursive;
      font-size: 64px;
      line-height: 1;
    }

    .sign-name {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sign-role {
      margin-top: 2px;
      font-size: 36px;
      font-weight: 700;
      color: var(--muted);
    }

    .badge {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin: 0 auto 8px;
      background: radial-gradient(circle at 40% 38%, #fde68a, #f59e0b 72%);
      border: 10px solid #fcd34d;
      box-shadow: 0 0 0 8px #fef3c7;
    }
  </style>
</head>
<body>
  <div class="certificate">
    <div class="shape top-right"></div>
    <div class="shape bottom-left"></div>
    <div class="shape bottom-center"></div>
    <div class="inner-border"></div>

    <div class="content">
      <section>
        <div class="heading">
          <h1>CERTIFICATE</h1>
          <div class="subtitle">OF ACHIEVEMENT</div>
        </div>

        <div class="presented">PROUDLY PRESENTED TO</div>
        <div class="recipient-name">{{learnerName}}</div>

        <p class="description">
          In recognition of your dedication, passion, and hard work in successfully completing
          <strong>{{certificationTitle}}</strong> with a final score of <strong>{{score}}</strong>.
        </p>
      </section>

      <section class="footer">
        <div class="signature-wrap">
          <div class="signature-line">{{leftSignature}}</div>
          <div class="sign-name">{{leftName}}</div>
          <div class="sign-role">{{leftRole}}</div>
        </div>

        <div>
          <div class="badge"></div>
        </div>

        <div class="signature-wrap">
          <div class="signature-line">{{rightSignature}}</div>
          <div class="sign-name">{{rightName}}</div>
          <div class="sign-role">{{rightRole}}</div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
